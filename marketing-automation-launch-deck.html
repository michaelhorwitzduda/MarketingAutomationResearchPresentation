<title>Duda Marketing Automation — Launch Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

/* ============================================================
   Design tokens — Stripe Press / FT register
   (matches Vibe Campaign exec-brief template)
   ============================================================ */
:root {
  --paper:        #F4F0E6;
  --paper-2:      #ECE6D8;
  --paper-3:      #E2DCCC;
  --ink:          #14161B;
  --ink-2:        #3D4148;
  --ink-3:        #6A6F78;
  --ink-4:        #969BA3;
  --hairline:     #C9C1AC;
  --hairline-2:   #D6CFBC;
  --accent:       #7A1F2B;
  --accent-soft:  #F0DDD9;
  --accent-ink:   #5C1620;
  --affirm:       #2E5D3A;
  --warn:         #8A5A1E;
  --negative:     #6A6F78;
  --serif:        'Source Serif 4', 'Charter', Georgia, serif;
  --sans:         'Geist', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --mono:         'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  height: 100%;
  overflow: hidden;
}
body { font-size: 15px; line-height: 1.55; }
#root { height: 100vh; }

/* ── Layout ── */
.stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  padding: 72px 80px 80px;
  overflow-y: auto; overflow-x: hidden;
}
.slide::-webkit-scrollbar { width: 6px; }
.slide::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }

/* ── Top chrome ── */
.chrome-top {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px;
  font-family: var(--mono); font-size: 10.5px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-3); z-index: 50; pointer-events: none;
  background: color-mix(in srgb, var(--paper) 92%, transparent);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 0.5px solid var(--hairline-2);
}
.chrome-top > * { pointer-events: auto; }
.chrome-title { display: flex; align-items: center; gap: 14px; }
.chrome-mark {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); position: relative;
}
.chrome-mark::after {
  content: ""; position: absolute; top: 4px; left: 4px;
  width: 8px; height: 8px; border-radius: 50%; background: var(--paper);
}
.slide-counter { display: flex; align-items: center; gap: 16px; }
.slide-counter button {
  background: none; border: none; font: inherit;
  letter-spacing: inherit; color: var(--ink-3); cursor: pointer;
  padding: 4px 8px; border-radius: 4px; transition: color 0.12s, background 0.12s;
}
.slide-counter button:hover { color: var(--ink); background: var(--paper-2); }
.slide-counter button:disabled { opacity: 0.3; cursor: default; }
.slide-counter .nums { font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 500; }
.slide-counter .nums .total { color: var(--ink-4); margin-left: 2px; }

/* ── Bottom chrome ── */
.chrome-bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  padding: 0 28px 22px; z-index: 50; pointer-events: none;
}
.dots {
  display: flex; gap: 6px;
  background: rgba(244, 240, 230, 0.9); backdrop-filter: blur(8px);
  border: 0.5px solid var(--hairline); padding: 8px 12px; border-radius: 999px;
  pointer-events: auto;
}
.dot {
  width: 26px; height: 18px; background: none; border: none; cursor: pointer;
  padding: 0; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 9.5px; color: var(--ink-4);
  border-radius: 4px; transition: all 0.12s; font-variant-numeric: tabular-nums;
}
.dot:hover { color: var(--ink); background: var(--paper-2); }
.dot.active { color: var(--paper); background: var(--ink); }

/* ── Nav arrows ── */
.nav-arrow {
  position: fixed; top: 50%; transform: translateY(-50%); z-index: 60;
  width: 42px; height: 42px; border-radius: 999px;
  border: 0.5px solid var(--hairline);
  background: rgba(244, 240, 230, 0.86); backdrop-filter: blur(8px);
  color: var(--ink); font-family: var(--mono); font-size: 22px; line-height: 1;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: background 0.12s, opacity 0.12s, transform 0.12s;
}
.nav-arrow:hover { background: var(--paper-2); }
.nav-arrow:active { transform: translateY(-50%) scale(0.96); }
.nav-arrow:disabled { opacity: 0.24; cursor: default; }
.nav-arrow.prev { left: 18px; }
.nav-arrow.next { right: 18px; }

/* ── Building blocks ── */
.eyebrow {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent); font-weight: 500;
  display: inline-flex; align-items: center; gap: 10px;
}
.eyebrow::before {
  content: ""; display: inline-block; width: 18px; height: 1.5px; background: var(--accent);
}

.slide-title {
  font-family: var(--serif); font-weight: 400; font-size: 44px;
  line-height: 1.1; letter-spacing: -0.018em; color: var(--ink);
  margin: 16px 0 0; max-width: 30ch; text-wrap: balance;
}
.slide-title em { font-style: italic; color: var(--accent); font-variation-settings: "opsz" 48; }

.deck-body {
  font-family: var(--serif); font-size: 17px; line-height: 1.55;
  color: var(--ink-2); max-width: 62ch; margin-top: 16px;
}
.deck-body em { font-style: italic; color: var(--ink); }

.section-eyebrow {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-4); font-weight: 500;
}

.hairline { border-top: 0.5px solid var(--hairline); }

.slide-footer {
  margin-top: auto; padding-top: 28px;
  border-top: 0.5px solid var(--hairline);
  display: flex; justify-content: space-between; align-items: flex-end; gap: 24px;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
  color: var(--ink-4); text-transform: uppercase;
}
.slide-footer a, .src-link {
  color: var(--ink-3); text-decoration: none;
  border-bottom: 0.5px dotted var(--ink-4);
}
.slide-footer a:hover, .src-link:hover { color: var(--accent); border-bottom-color: var(--accent); }

.opinion {
  font-family: var(--serif); font-size: 28px; line-height: 1.25;
  font-weight: 400; letter-spacing: -0.012em; color: var(--ink);
  max-width: 26ch; text-wrap: balance; padding-left: 18px;
  border-left: 2px solid var(--accent);
}

.big-num {
  font-family: var(--serif); font-weight: 400; font-size: 64px;
  line-height: 0.95; letter-spacing: -0.025em; color: var(--ink);
  font-variant-numeric: lining-nums tabular-nums;
}
.big-num .unit {
  font-family: var(--sans); font-size: 0.36em; color: var(--ink-3);
  font-weight: 400; letter-spacing: 0; margin-left: 6px;
}

.mid-num {
  font-family: var(--serif); font-size: 36px; line-height: 1;
  font-weight: 400; letter-spacing: -0.02em; color: var(--ink);
  font-variant-numeric: lining-nums tabular-nums;
}

.card { background: transparent; border: 0.5px solid var(--hairline); border-radius: 4px; padding: 22px; }
.card.inset { background: var(--paper-2); border: none; }
.card.accent { background: var(--accent-soft); border: 0.5px solid color-mix(in srgb, var(--accent) 30%, transparent); }

.symbol-check { color: var(--affirm); font-weight: 500; }
.symbol-no    { color: var(--ink-4); }
.symbol-partial { color: var(--warn); font-weight: 500; }

.tab-bar { display: flex; gap: 0; border-bottom: 0.5px solid var(--hairline); }
.tab {
  font-family: var(--sans); font-size: 12.5px; font-weight: 500;
  letter-spacing: 0.01em; color: var(--ink-3); background: none;
  border: none; padding: 12px 18px; cursor: pointer;
  position: relative; margin-bottom: -0.5px; transition: color 0.12s;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--ink); border-bottom: 1.5px solid var(--ink); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.32s ease-out both; }

/* Slider */
input[type="range"].slider {
  -webkit-appearance: none; appearance: none; width: 100%;
  height: 2px; background: var(--hairline); border-radius: 2px; outline: none;
}
input[type="range"].slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: var(--ink); cursor: pointer;
  border: 2px solid var(--paper); box-shadow: 0 0 0 1px var(--ink);
}
input[type="range"].slider::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%; background: var(--ink);
  cursor: pointer; border: 2px solid var(--paper); box-shadow: 0 0 0 1px var(--ink);
}

.seg { display: inline-flex; border: 0.5px solid var(--hairline); border-radius: 999px; overflow: hidden; background: var(--paper-2); }
.seg-btn { background: none; border: none; cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-3); padding: 7px 16px; transition: color 0.12s, background 0.12s; font-variant-numeric: tabular-nums; }
.seg-btn:hover { color: var(--ink); }
.seg-btn.active { background: var(--ink); color: var(--paper); }

.disclosure { border-top: 0.5px solid var(--hairline); cursor: pointer; }
.disclosure-head {
  padding: 22px 0; display: flex; gap: 24px;
  align-items: baseline; cursor: pointer; user-select: none;
}
.disclosure-num {
  font-family: var(--mono); font-size: 11px; color: var(--ink-4);
  letter-spacing: 0.06em; min-width: 32px;
}
.disclosure-title {
  font-family: var(--serif); font-size: 28px; font-weight: 400;
  letter-spacing: -0.012em; color: var(--ink); flex: 1;
}
.disclosure-marker {
  font-family: var(--mono); font-size: 11px; color: var(--ink-4);
  transition: transform 0.2s;
}
.disclosure.open .disclosure-marker { transform: rotate(45deg); color: var(--accent); }
.disclosure-body { padding: 0 0 28px 56px; max-width: 76ch; }

/* Quote block */
.vq {
  border-left: 2px solid var(--hairline); padding: 4px 0 4px 16px;
}
.vq.hot { border-left-color: var(--accent); }
.vq-text {
  font-family: var(--serif); font-size: 15.5px; line-height: 1.5;
  color: var(--ink); font-style: italic;
}
.vq-meta {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em;
  color: var(--ink-4); margin-top: 7px; text-transform: uppercase;
}
.vq-meta a { color: var(--ink-3); text-decoration: none; border-bottom: 0.5px dotted var(--ink-4); }
.vq-meta a:hover { color: var(--accent); }

/* Day-one bar grid */
.insurance-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  margin-top: 28px;
}
.insurance-item {
  padding: 18px 20px; background: var(--paper-2); border-radius: 4px;
  border-left: 2px solid var(--accent);
}
.insurance-item .label {
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  color: var(--ink); margin-bottom: 6px;
}
.insurance-item .desc {
  font-family: var(--serif); font-size: 13.5px; color: var(--ink-2); line-height: 1.45;
}

/* Recommendation / ask cards */
.rec-card {
  padding: 28px 24px; background: var(--paper-2);
  border-top: 2px solid var(--accent);
  display: flex; flex-direction: column; gap: 14px;
}
.rec-card .card-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent); font-weight: 500;
}
.rec-card h3 {
  font-family: var(--serif); font-size: 24px; font-weight: 400;
  letter-spacing: -0.012em; color: var(--ink); line-height: 1.2; margin: 0;
}
.rec-card p { font-family: var(--serif); font-size: 14.5px; color: var(--ink-2); line-height: 1.5; }

/* ── Phase tags ── */
.phase-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.14em;
  text-transform: uppercase; font-weight: 500;
  padding: 4px 11px; border-radius: 999px; margin-bottom: 14px;
}
.phase-tag::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}
.phase-research { color: var(--ink-3); border: 0.5px solid var(--hairline); background: transparent; }
.phase-rec { color: var(--paper); background: var(--accent); border: 0.5px solid var(--accent); }
.phase-rec::before { background: var(--paper); }
.phase-tbc { color: var(--warn); border: 0.5px dashed color-mix(in srgb, var(--warn) 55%, var(--hairline)); background: transparent; }

/* Responsive */
@media (max-width: 1100px) {
  .slide { padding: 68px 48px 80px; }
  .slide-title { font-size: 36px; }
  .opinion { font-size: 22px; }
  .big-num { font-size: 52px; }
}
@media (max-width: 800px) {
  .slide { padding: 48px 28px 80px; }
  .slide-title { font-size: 30px; }
}
@media (max-width: 760px) {
  html, body, #root, .stage { width: 100%; min-width: 0; overflow: hidden; }
  body { font-size: 15px; line-height: 1.5; }
  .stage { height: 100dvh; }
  .slide { position: absolute; inset: 0; padding: 104px 20px 96px; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .chrome-top { align-items: flex-start; gap: 10px; padding: 14px 14px 10px; font-size: 9px; }
  .chrome-title { gap: 10px; min-width: 0; max-width: 42vw; line-height: 1.35; }
  .slide-counter { gap: 4px; justify-content: flex-end; flex-wrap: wrap; max-width: 55vw; }
  .chrome-bottom { padding: 0 8px 14px; }
  .dots { max-width: calc(100vw - 24px); overflow-x: auto; gap: 4px; padding: 8px 10px; scrollbar-width: none; }
  .dot { flex: 0 0 34px; width: 34px; height: 28px; font-size: 10px; }
  .nav-arrow { top: auto; bottom: 58px; width: 38px; height: 38px; font-size: 20px; }
  .nav-arrow.prev { left: 12px; }
  .nav-arrow.next { right: 12px; }
  .slide-title { font-size: clamp(32px, 10vw, 44px); line-height: 1.05; max-width: 100%; }
  .deck-body { font-size: 17px; max-width: 100%; }
  .opinion { font-size: 23px; max-width: 100%; }
  .big-num { font-size: clamp(42px, 14vw, 58px); }
  .card { padding: 18px; }
  .slide-footer { flex-direction: column; align-items: flex-start; gap: 8px; padding-top: 20px; margin-top: 28px; font-size: 9.5px; }
  .tab-bar { overflow-x: auto; scrollbar-width: none; }
  .tab { flex: 0 0 auto; padding: 11px 14px; }
  .disclosure-title { font-size: 21px; }
  .disclosure-body { padding: 0 0 22px 0; }
  .slide [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
  .slide [style*="display: grid"] { gap: 18px !important; }
  .slide [style*="min-width"] { min-width: 0 !important; }
  .slide [style*="max-width"] { max-width: 100% !important; }
  .insurance-grid { grid-template-columns: 1fr; }
}

</style>
</head>

<script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;
const D = window.DECK_DATA;

/* ============================================================
   Shared components
   ============================================================ */

function Eyebrow({ children }) {
  return <div className="eyebrow">{children}</div>;
}

function PhaseBadge({ kind }) {
  var map = { research: "Research finding", rec: "Recommendation", tbc: "To be confirmed" };
  return <span className={"phase-tag phase-" + kind}>{map[kind] || map.research}</span>;
}

function SlideTitle({ children, style }) {
  return <h1 className="slide-title" style={style}>{children}</h1>;
}

function SlideHeader({ eyebrow, title, lede, phase, children }) {
  return (
    <div>
      {phase && <div><PhaseBadge kind={phase} /></div>}
      <Eyebrow>{eyebrow}</Eyebrow>
      <SlideTitle>{title}</SlideTitle>
      {lede && <p className="deck-body">{lede}</p>}
      {children}
    </div>
  );
}

function Disclosure({ num, title, defaultOpen = false, children }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className={"disclosure" + (open ? " open" : "")}>
      <div className="disclosure-head" onClick={function() { setOpen(!open); }}>
        <div className="disclosure-num">{num}</div>
        <div className="disclosure-title">{title}</div>
        <div className="disclosure-marker">{open ? "—" : "+"}</div>
      </div>
      {open && <div className="disclosure-body fade-up">{children}</div>}
    </div>
  );
}

function BigNum({ children, unit, color, size }) {
  var cls = size === "mid" ? "mid-num" : "big-num";
  return (
    <span className={cls} style={{ color: color || "var(--ink)" }}>
      {children}{unit && <span className="unit">{unit}</span>}
    </span>
  );
}

function Mark({ kind }) {
  if (kind === true || kind === "yes") return <span className="symbol-check">{"✓"}</span>;
  if (kind === "partial" || kind === "~") return <span className="symbol-partial">~</span>;
  return <span className="symbol-no">{"—"}</span>;
}

function HBar({ value, max, color, height, label, right, labelWidth }) {
  if (!color) color = "var(--ink)";
  if (!height) height = 8;
  var pct = Math.max(0.5, Math.min(100, (value / max) * 100));
  return (
    <div style={{ width: "100%", display: "flex", alignItems: "center", gap: 12 }}>
      {label !== undefined && <div style={{ minWidth: labelWidth || 130, fontFamily: "var(--sans)", fontSize: 12, color: "var(--ink-2)" }}>{label}</div>}
      <div style={{ flex: 1, height: height, background: "var(--paper-3)", position: "relative" }}>
        <div style={{ position: "absolute", inset: 0, width: pct + "%", background: color }} />
      </div>
      {right !== undefined && <div style={{ minWidth: 90, fontFamily: "var(--mono)", fontSize: 11, color: "var(--ink-2)", textAlign: "right", fontVariantNumeric: "tabular-nums" }}>{right}</div>}
    </div>
  );
}

function Knob({ label, min, max, step, value, onChange, format, hint }) {
  if (!step) step = 1;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <span style={{ fontFamily: "var(--sans)", fontSize: 12, color: "var(--ink-2)", fontWeight: 500 }}>{label}</span>
        <span style={{ fontFamily: "var(--mono)", fontSize: 13, color: "var(--ink)", fontWeight: 500, fontVariantNumeric: "tabular-nums" }}>{format ? format(value) : value}</span>
      </div>
      <input type="range" className="slider" min={min} max={max} step={step} value={value} onChange={function(e) { onChange(parseFloat(e.target.value)); }} />
      {hint && <div style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--ink-4)", letterSpacing: "0.04em", textTransform: "uppercase" }}>{hint}</div>}
    </div>
  );
}

function Quote({ q }) {
  return (
    <div className={"vq" + (q.hot ? " hot" : "")}>
      <div className="vq-text">{"“" + q.q + "”"}</div>
      <div className="vq-meta">{q.meta}</div>
    </div>
  );
}

/* ============================================================
   Deck shell
   ============================================================ */

var SLIDES = [
  { id: 1,  title: "Cover",                          short: "Cover",    comp: SlideCover },
  { id: 2,  title: "Our customer base",              short: "Base",     comp: SlideCustomerMA },
  { id: 3,  title: "The competitor",                   short: "Competitor", comp: SlideFinding },
  { id: 4,  title: "Demand in their words",          short: "Demand",   comp: SlideDemand },
  { id: 5,  title: "Use cases → launch scope",       short: "UseCases", comp: SlideUseCases },
  { id: 6,  title: "Front one: dedicated platforms", short: "GHL/AC",   comp: SlideDedicated },
  { id: 7,  title: "Front two: builders + add-ons",  short: "Builders", comp: SlideBuilders },
  { id: 8,  title: "Differentiation matrix",         short: "Matrix",   comp: SlideMatrix },
  { id: 9,  title: "Pricing",                        short: "Pricing",  comp: SlidePricing },
  { id: 10, title: "Risks & recommendations",        short: "Risks",    comp: SlideRisks },
  { id: 11, title: "The ask",                        short: "Ask",      comp: SlideAsk },
];

function App() {
  var _idx = useState(function() {
    var hash = parseInt(window.location.hash.replace("#", ""), 10);
    if (!isNaN(hash) && hash >= 1 && hash <= SLIDES.length) return hash - 1;
    return 0;
  });
  var idx = _idx[0]; var setIdx = _idx[1];
  var _m = useState(false); var menuOpen = _m[0]; var setMenuOpen = _m[1];
  var touchStartRef = useRef(null);

  var goPrev = useCallback(function() { setIdx(function(i) { return Math.max(0, i - 1); }); }, []);
  var goNext = useCallback(function() { setIdx(function(i) { return Math.min(SLIDES.length - 1, i + 1); }); }, []);

  window.jumpToSlide = function(i) { setIdx(i); };

  function handleTouchStart(e) {
    var t = e.touches && e.touches[0];
    if (!t) return;
    touchStartRef.current = { x: t.clientX, y: t.clientY, time: Date.now() };
  }
  function handleTouchEnd(e) {
    var start = touchStartRef.current;
    touchStartRef.current = null;
    var t = e.changedTouches && e.changedTouches[0];
    if (!start || !t) return;
    var dx = t.clientX - start.x;
    var dy = t.clientY - start.y;
    var elapsed = Date.now() - start.time;
    if (Math.abs(dx) < 48 || Math.abs(dx) < Math.abs(dy) * 1.2 || elapsed > 900) return;
    if (dx < 0) goNext(); else goPrev();
  }

  useEffect(function() { window.location.hash = String(idx + 1); }, [idx]);

  useEffect(function() {
    function onKey(e) {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (e.key === "ArrowRight" || e.key === "PageDown") { e.preventDefault(); goNext(); }
      else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); goPrev(); }
      else if (e.key === "Home") { e.preventDefault(); setIdx(0); }
      else if (e.key === "End") { e.preventDefault(); setIdx(SLIDES.length - 1); }
      else if (e.key === "Escape") { setMenuOpen(false); }
    }
    window.addEventListener("keydown", onKey);
    return function() { window.removeEventListener("keydown", onKey); };
  }, [goNext, goPrev]);

  var slide = SLIDES[idx];
  var SlideComp = slide.comp;

  return (
    <div className="stage" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
      <div className="chrome-top">
        <div className="chrome-title">
          <span className="chrome-mark"></span>
          <span>{"Duda · Marketing Automation · Launch Brief"}</span>
        </div>
        <div className="slide-counter">
          <button onClick={goPrev} disabled={idx === 0}>Prev</button>
          <button onClick={function() { setMenuOpen(function(o) { return !o; }); }} style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span className="nums">{String(idx + 1).padStart(2, "0")}<span className="total">{"/" + String(SLIDES.length).padStart(2, "0")}</span></span>
            <span style={{ fontFamily: "var(--sans)", textTransform: "none", letterSpacing: 0, fontSize: 12, color: "var(--ink-2)", fontWeight: 500 }}>{slide.title}</span>
          </button>
          <button onClick={goNext} disabled={idx === SLIDES.length - 1}>Next</button>
        </div>
      </div>

      <React.Fragment key={idx}>
        <SlideComp />
      </React.Fragment>

      <button className="nav-arrow prev" onClick={goPrev} disabled={idx === 0} aria-label="Previous slide">{"‹"}</button>
      <button className="nav-arrow next" onClick={goNext} disabled={idx === SLIDES.length - 1} aria-label="Next slide">{"›"}</button>

      <div className="chrome-bottom">
        <div className="dots">
          {SLIDES.map(function(s, i) {
            return (
              <button key={s.id} className={"dot" + (i === idx ? " active" : "")} onClick={function() { setIdx(i); }} title={s.title}>
                {String(i + 1).padStart(2, "0")}
              </button>
            );
          })}
        </div>
      </div>

      {menuOpen && (
        <div onClick={function() { setMenuOpen(false); }} style={{
          position: "fixed", inset: 0,
          background: "rgba(20, 22, 27, 0.4)", backdropFilter: "blur(2px)",
          zIndex: 100, display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: 80,
        }}>
          <div onClick={function(e) { e.stopPropagation(); }} style={{
            background: "var(--paper)", border: "0.5px solid var(--hairline)",
            borderRadius: 4, minWidth: 480, maxWidth: 560, padding: 8,
            boxShadow: "0 24px 64px rgba(20,22,27,0.18)",
          }}>
            <div style={{
              padding: "10px 14px", fontFamily: "var(--mono)", fontSize: 10,
              letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--ink-4)",
              borderBottom: "0.5px solid var(--hairline-2)", marginBottom: 4,
            }}>Jump to slide</div>
            {SLIDES.map(function(s, i) {
              return (
                <button key={s.id} onClick={function() { setIdx(i); setMenuOpen(false); }} style={{
                  display: "flex", width: "100%", gap: 16, padding: "10px 14px",
                  background: i === idx ? "var(--paper-2)" : "none",
                  border: "none", borderRadius: 3, cursor: "pointer", textAlign: "left", alignItems: "baseline",
                }}
                  onMouseEnter={function(e) { if (i !== idx) e.currentTarget.style.background = "var(--paper-2)"; }}
                  onMouseLeave={function(e) { if (i !== idx) e.currentTarget.style.background = "none"; }}
                >
                  <span style={{ fontFamily: "var(--mono)", fontSize: 11, color: i === idx ? "var(--accent)" : "var(--ink-4)", minWidth: 28, fontVariantNumeric: "tabular-nums" }}>{String(i + 1).padStart(2, "0")}</span>
                  <span style={{ fontFamily: "var(--serif)", fontSize: 16, color: "var(--ink)", flex: 1 }}>{s.title}</span>
                  {i === idx && <span style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--accent)" }}>CURRENT</span>}
                </button>
              );
            })}
            <div style={{
              borderTop: "0.5px solid var(--hairline-2)", marginTop: 4, padding: "10px 14px",
              display: "flex", gap: 16, alignItems: "center",
            }}>
              <span style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--ink-4)" }}>Downloads</span>
              <a href="https://drive.google.com/file/d/1QFCp5-eBmnOiqXjYxfROwOq5qycgRyp8/view?usp=sharing" target="_blank" rel="noopener" style={{
                fontFamily: "var(--sans)", fontSize: 12, color: "var(--accent)", textDecoration: "none",
                borderBottom: "0.5px solid var(--accent-3)", paddingBottom: 1,
              }}>Data kit (ZIP)</a>
              <a href="marketing-automation-launch-deck.html" download style={{
                fontFamily: "var(--sans)", fontSize: 12, color: "var(--accent)", textDecoration: "none",
                borderBottom: "0.5px solid var(--accent-3)", paddingBottom: 1,
              }}>Deck (HTML)</a>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
